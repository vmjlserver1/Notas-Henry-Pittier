<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación Docente - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #6f42c1;
      --secondary-color: #6c757d;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #5a32a3 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background-color: #f8f9fa;
      border-left-color: var(--primary-color);
      color: var(--primary-color);
    }

    .main-content {
      padding: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-color);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .nota-cell {
      text-align: center;
      padding: 8px !important;
    }

    .nota-value {
      background-color: #f8f9fa;
      padding: 6px 10px;
      border-radius: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="javascript:location.reload()">
        <i class="bi bi-clipboard-check"></i> Evaluación Docente | NOTAS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.irAPerfil()">
              <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.logout()">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="margin-top: 56px;">
    <div class="row g-0">
      <!-- SIDEBAR -->
      <div class="col-md-3 d-none d-md-block">
        <div class="sidebar">
          <div class="p-3 border-bottom">
            <div style="display: flex; gap: 10px; align-items: center;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #5a32a3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;" id="userInitials">E</div>
              <div>
                <div style="font-weight: 600; font-size: 0.9rem;" id="userName">Evaluador</div>
                <small class="text-muted" id="userEmail">eval@ejemplo.com</small>
              </div>
            </div>
          </div>
          <nav class="nav flex-column">
            <a class="nav-item nav-link active" href="javascript:cargarSeccion('inicio')">
              <i class="bi bi-speedometer2"></i> Panel Principal
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('asignaciones')">
              <i class="bi bi-diagram-3"></i> Asignación de Docentes
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('calificaciones')">
              <i class="bi bi-list-check"></i> Revisión de Notas
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('reportes')">
              <i class="bi bi-file-earmark-chart"></i> Reportes
            </a>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9">
        <div class="main-content">
          <div id="contentArea">
            <!-- Contenido dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL ASIGNAR DOCENTE -->
  <div class="modal fade" id="modalAsignarDocente" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="background: linear-gradient(135deg, var(--primary-color), #5a32a3); color: white;">
          <h5 class="modal-title">Asignar Docente a Materia</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Sección *</label>
            <select class="form-select" id="seccionSelect" required>
              <option value="">-- Seleccionar --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Materia *</label>
            <select class="form-select" id="materiaSelect" required>
              <option value="">-- Seleccionar --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Docente *</label>
            <select class="form-select" id="docenteSelect" required>
              <option value="">-- Seleccionar --</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button id="btnAsignarEvaluacion" type="button" class="btn btn-primary">Asignar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!sessionAPI.estaAutenticado()) {
        window.location.href = '/index.html';
        return;
      }

      const rol = sessionAPI.obtenerRolPrincipal();
      if (rol !== 'Evaluacion_docente') {
        window.location.href = '/index.html';
        return;
      }

      const usuario = sessionAPI.obtenerUsuario();
      document.getElementById('userName').textContent = `${usuario.nombre} ${usuario.apellido}`;
      document.getElementById('userEmail').textContent = usuario.email;

      cargarSeccion('inicio');
    });

    async function cargarSeccion(seccion) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      const activeLink = document.querySelector(`.nav-item[href*="${seccion}"]`);
      if (activeLink) activeLink.classList.add('active');

      switch(seccion) {
        case 'inicio':
          await cargarInicio();
          break;
        case 'asignaciones':
          await cargarAsignaciones();
          break;
        case 'calificaciones':
          await cargarCalificaciones();
          break;
        case 'reportes':
          await cargarReportes();
          break;
      }
    }

    async function cargarInicio() {
      const contentArea = document.getElementById('contentArea');
      try {
        const periodoActivo = await API.periodos.obtenerActivo();
        const secciones = await API.secciones.listar();

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-speedometer2"></i> Panel Principal</h2>
          </div>

          <div class="row">
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${secciones?.length || 0}</div>
                <div class="stat-label">Secciones Activas</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${periodoActivo ? 'Activo' : 'Cerrado'}</div>
                <div class="stat-label">Período Académico</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Notas Pendientes</div>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-header" style="background: linear-gradient(135deg, var(--primary-color), #5a32a3); color: white; border: none;">
              <h5 class="mb-0"><i class="bi bi-info-circle"></i> Información del Período</h5>
            </div>
            <div class="card-body">
              <p><strong>Período Actual:</strong> ${periodoActivo?.nombre || 'No hay período activo'}</p>
              <p><strong>Secciones bajo evaluación:</strong> ${secciones?.length || 0}</p>
            </div>
          </div>
        `;

      } catch(error) {
        console.error('Error:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      }
    }

    async function cargarAsignaciones() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-diagram-3"></i> Asignación de Docentes</h2>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAsignarDocente">
            + Asignar Docente
          </button>
        </div>

        <div class="table-responsive">
          <table class="table table-hover">
            <thead style="background-color: #f8f9fa;">
              <tr>
                <th>Sección</th>
                <th>Materia</th>
                <th>Docente Asignado</th>
                <th>Lapso</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="asignacionesTable">
              <tr><td colspan="5" class="text-center text-muted">Cargando asignaciones...</td></tr>
            </tbody>
          </table>
        </div>
      `;

      try {
        const secciones = await API.secciones.listar();
        const tabla = document.getElementById('asignacionesTable');
        
        if (secciones && secciones.length > 0) {
          let html = '';
          for (const seccion of secciones) {
            const materias = await API.secciones.listarMaterias(seccion.id);
            if (materias) {
              materias.forEach(m => {
                html += `
                  <tr>
                    <td><strong>${seccion.nombre}</strong></td>
                    <td>${m.nombre}</td>
                    <td>${m.docente_nombre || 'Sin asignar'}</td>
                    <td>${m.lapso_numero || '-'}</td>
                    <td>
                      <button class="btn btn-sm btn-outline-danger">Cambiar</button>
                    </td>
                  </tr>
                `;
              });
            }
          }
          tabla.innerHTML = html || '<tr><td colspan="5" class="text-center text-muted">Sin asignaciones</td></tr>';
        }
      } catch(error) {
        console.error('Error:', error);
      }
    }

    async function cargarCalificaciones() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-list-check"></i> Revisión de Calificaciones</h2>
        </div>

        <div class="row mb-4">
          <div class="col-md-4">
            <label class="form-label">Sección</label>
            <select class="form-select" id="filtroSeccion" onchange="actualizarTablaCalificaciones()">
              <option value="">-- Todas --</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Lapso</label>
            <select class="form-select" id="filtroLapso" onchange="actualizarTablaCalificaciones()">
              <option value="">-- Todos --</option>
            </select>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-hover table-sm">
            <thead style="background-color: #f8f9fa;">
              <tr>
                <th>Estudiante</th>
                <th>Materia</th>
                <th>Nota</th>
                <th>Lapso</th>
                <th>Docente</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="calificacionesTable">
              <tr><td colspan="6" class="text-center text-muted">Cargando calificaciones...</td></tr>
            </tbody>
          </table>
        </div>
      `;
    }

    async function cargarReportes() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-file-earmark-chart"></i> Reportes</h2>
        </div>

        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Sección</label>
                <select class="form-select" id="selectSeccionReporte">
                  <option value="">-- Selecciona sección --</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Año Escolar</label>
                <select class="form-select" id="selectAnioReporte">
                  <option value="">-- Selecciona año --</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Estudiante (ID)</label>
                <input type="text" id="inputEstudianteReporte" class="form-control" placeholder="ID estudiante">
              </div>
            </div>

            <div class="row g-3 mt-3">
              <div class="col-md-4">
                <button id="btnGenerarSabana" class="btn btn-primary w-100" onclick="generarReporteSabana()">
                  Generar Sabana
                </button>
              </div>
              <div class="col-md-4">
                <button id="btnGenerarActa" class="btn btn-secondary w-100" onclick="generarActaFinal()">
                  Generar Acta Final
                </button>
              </div>
              <div class="col-md-4">
                <button id="btnGenerarBoletin" class="btn btn-outline-primary w-100" onclick="generarBoletinEstudiante()">
                  Generar Boletín
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="reporteResultados"></div>
      `;

      try {
        const secciones = await API.secciones.listar({ activo: true });
        const anios = await API.periodos.listarAnios();
        const selectSeccion = document.getElementById('selectSeccionReporte');
        const selectAnio = document.getElementById('selectAnioReporte');

        if (Array.isArray(secciones)) {
          secciones.forEach((s) => {
            const id = s.id_seccion || s.id || s.id_seccion;
            const nombre = s.nombre || `${s.grado || ''} ${s.letra || ''}`.trim() || `Sección ${id}`;
            selectSeccion.insertAdjacentHTML('beforeend', `<option value="${id}">${nombre}</option>`);
          });
        }

        if (Array.isArray(anios)) {
          anios.forEach((anio) => {
            const id = anio.id_anio || anio.id || anio.anio_escolar_id;
            const nombre = anio.nombre || anio.nombre_anio || `Año ${id}`;
            selectAnio.insertAdjacentHTML('beforeend', `<option value="${id}">${nombre}</option>`);
          });
        }
      } catch (error) {
        console.error('Error al cargar opciones de reportes:', error);
        document.getElementById('reporteResultados').innerHTML = `<div class="alert alert-danger">Error cargando datos de reportes: ${error.message}</div>`;
      }
    }

    async function generarReporteSabana() {
      const seccionId = document.getElementById('selectSeccionReporte').value;
      const resultado = document.getElementById('reporteResultados');
      if (!seccionId) {
        resultado.innerHTML = `<div class="alert alert-warning">Selecciona primero una sección para generar la sabana.</div>`;
        return;
      }

      resultado.innerHTML = `<div class="alert alert-info">Generando sabana...</div>`;
      try {
        const datos = await API.reportes.generarDatosSabana(seccionId);
        if (!Array.isArray(datos)) {
          throw new Error('La respuesta del servidor no es un arreglo válido');
        }
        resultado.innerHTML = mostrarTablaSabana(datos);
      } catch (error) {
        console.error('Error generando sabana:', error);
        resultado.innerHTML = `<div class="alert alert-danger">Error generando sabana: ${error.message}</div>`;
      }
    }

    async function generarActaFinal() {
      const seccionId = document.getElementById('selectSeccionReporte').value;
      const anioId = document.getElementById('selectAnioReporte').value;
      const resultado = document.getElementById('reporteResultados');

      if (!seccionId || !anioId) {
        resultado.innerHTML = `<div class="alert alert-warning">Selecciona sección y año escolar para generar el acta final.</div>`;
        return;
      }

      resultado.innerHTML = `<div class="alert alert-info">Generando acta final...</div>`;
      try {
        const data = await API.reportes.generarActaFinal(seccionId, anioId);
        if (!data || !Array.isArray(data.registros)) {
          throw new Error('La respuesta del servidor no contiene registros válidos');
        }
        resultado.innerHTML = crearTablaActaFinal(data.registros);
      } catch (error) {
        console.error('Error generando acta final:', error);
        resultado.innerHTML = `<div class="alert alert-danger">Error generando acta final: ${error.message}</div>`;
      }
    }

    async function generarBoletinEstudiante() {
      const estudianteId = document.getElementById('inputEstudianteReporte').value.trim();
      const anioId = document.getElementById('selectAnioReporte').value;
      const resultado = document.getElementById('reporteResultados');

      if (!estudianteId || !anioId) {
        resultado.innerHTML = `<div class="alert alert-warning">Indica ID de estudiante y año escolar para generar el boletín.</div>`;
        return;
      }

      resultado.innerHTML = `<div class="alert alert-info">Generando boletín...</div>`;
      try {
        const data = await API.reportes.generarBoletinEstudiante(estudianteId, anioId);
        resultado.innerHTML = crearPanelBoletin(data);
      } catch (error) {
        console.error('Error generando boletín:', error);
        resultado.innerHTML = `<div class="alert alert-danger">Error generando boletín: ${error.message}</div>`;
      }
    }

    function mostrarTablaSabana(datos) {
      if (!Array.isArray(datos) || datos.length === 0) {
        return `<div class="alert alert-secondary">No se encontraron datos de sabana para esta sección.</div>`;
      }

      const columnas = Object.keys(datos[0]);
      const headers = columnas.map(col => `<th>${col}</th>`).join('');
      const rows = datos.map(item => {
        return `<tr>${columnas.map(col => `<td>${typeof item[col] === 'object' ? JSON.stringify(item[col]) : item[col] || ''}</td>`).join('')}</tr>`;
      }).join('');

      return `
        <div class="card">
          <div class="card-header bg-dark text-white">Sabana de Calificaciones</div>
          <div class="table-responsive">
            <table class="table table-sm table-striped mb-0">
              <thead><tr>${headers}</tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function crearTablaActaFinal(registros) {
      if (!Array.isArray(registros) || registros.length === 0) {
        return `<div class="alert alert-secondary">No se encontraron registros para el acta final.</div>`;
      }

      const rows = registros.map((reg) => {
        const materias = Array.isArray(reg.materias)
          ? reg.materias.map(m => `${m.nombre}: ${m.definitiva} (${m.resultado})`).join('<br>')
          : '';

        return `
          <tr>
            <td>${reg.estudiante}</td>
            <td>${reg.cedula}</td>
            <td>${materias}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="card">
          <div class="card-header bg-dark text-white">Acta Final</div>
          <div class="table-responsive">
            <table class="table table-sm table-striped mb-0">
              <thead>
                <tr>
                  <th>Estudiante</th>
                  <th>Cédula</th>
                  <th>Materias</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function crearPanelBoletin(data) {
      if (!data || !data.estudiante) {
        return `<div class="alert alert-secondary">No se pudo generar el boletín. Verifica los datos ingresados.</div>`;
      }

      const calificaciones = data.calificaciones || {};
      const filas = Object.keys(calificaciones).map((materia) => {
        const valores = calificaciones[materia];
        return `
          <tr>
            <td>${materia}</td>
            <td>${valores.l1 || '-'}</td>
            <td>${valores.l2 || '-'}</td>
            <td>${valores.l3 || '-'}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="card">
          <div class="card-header bg-dark text-white">Boletín de ${data.estudiante}</div>
          <div class="card-body">
            <p><strong>Cédula:</strong> ${data.cedula || '-'}</p>
            <p><strong>Curso:</strong> ${data.curso || '-'}</p>
            <p><strong>Período:</strong> ${data.periodo || '-'}</p>
            <p><strong>Promedio general:</strong> ${data.promedio_general || '-'}</p>
          </div>
          <div class="table-responsive">
            <table class="table table-sm table-striped mb-0">
              <thead>
                <tr>
                  <th>Materia</th>
                  <th>Lapso 1</th>
                  <th>Lapso 2</th>
                  <th>Lapso 3</th>
                </tr>
              </thead>
              <tbody>${filas}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    async function guardarAsignacion() {
      const seccionId = document.getElementById('seccionSelect').value;
      const materiaId = document.getElementById('materiaSelect').value;
      const docenteId = document.getElementById('docenteSelect').value;

      if (!seccionId || !materiaId || !docenteId) {
        alert('Por favor completa todos los campos');
        return;
      }

      try {
        await API.secciones.asignarDocente(seccionId, materiaId, docenteId);
        bootstrap.Modal.getInstance(document.getElementById('modalAsignarDocente')).hide();
        cargarAsignaciones();
      } catch(error) {
        alert(`Error: ${error.message}`);
      }
    }

    // Attach button to prevent doble envío
    setTimeout(() => {
      const btn = document.getElementById('btnAsignarEvaluacion');
      if (btn) btn.addEventListener('click', async () => await runAsyncWithButton(btn, guardarAsignacion, 'Asignando...'));
    }, 50);
  </script>
</body>
</html>
