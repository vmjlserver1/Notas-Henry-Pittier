<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docente Dashboard - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #28a745;
      --secondary-color: #6c757d;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #1e7e34 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
    }

    .nav-item a:hover { text-decoration: none; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
      <a class="navbar-brand text-white" href="#">Docente</a>
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 d-flex flex-row">
        <li class="nav-item"><a class="nav-link text-white" href="#" onclick="cargarSeccion && cargarSeccion('inicio')">Inicio</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#" onclick="cargarSeccion && cargarSeccion('misecciones')">Mis Secciones</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#" onclick="cargarSeccion && cargarSeccion('cargarnotas')">Cargar Notas</a></li>
      </ul>
    </div>
  </nav>

  <main class="container mt-4">
    <div id="contentArea"></div>
  </main>

  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/utils-mejorado.js"></script>
  <script src="../../js/utils-frontend.js"></script>
  <script src="dashboard.js"></script>
  <script src="dashboard-backup.js"></script>
</body>
</html>
